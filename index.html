
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>CleanCodeHub - Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; text-align: center; transition: 0.3s; }
        .toolbar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px; }
        select, button { padding: 10px 15px; border-radius: 8px; border: 1px solid #1a73e8; cursor: pointer; font-weight: bold; }
        button { background-color: #1a73e8; color: white; }
        textarea { width: 100%; max-width: 800px; height: 200px; padding: 15px; border-radius: 10px; border: 1px solid #ccc; font-family: monospace; }
        #result-container { margin-top: 20px; text-align: left; max-width: 800px; margin: 20px auto; }
        #copyBtn { display: none; margin-top: 10px; background-color: #34a853; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        body.dark-mode { background-color: #121212; color: white; }
    </style>
</head>
<body>

    <h1>CleanCodeHub</h1>

    <div class="toolbar">
        <select id="sourceLang">
            <option value="json">JSON</option>
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="cpp">C++</option>
            <option value="java">Java</option>
        </select>
        <span>में बदलें</span>
        <select id="targetLang">
            <option value="json">JSON</option>
            <option value="python">Python</option>
            <option value="javascript">JavaScript</option>
            <option value="cpp">C++</option>
            <option value="java">Java</option>
        </select>
        
        <button onclick="processCode('clean')">क्लीन</button>
        <button onclick="processCode('minify')">मिनीफाई</button>
        <button onclick="processCode('convert')">कन्वर्ट</button>
        <button onclick="toggleDarkMode()">डार्क मोड</button>
    </div>

    <textarea id="codeInput" placeholder="अपना कोड यहाँ पेस्ट करें..."></textarea>

    <div id="result-container">
        <pre><code id="result" class="language-javascript"></code></pre>
        <button id="copyBtn" onclick="copyCode()">कॉपी करें</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script>
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

        function processCode(action) {
            let input = document.getElementById('codeInput').value;
            let src = document.getElementById('sourceLang').value;
            let target = document.getElementById('targetLang').value;
            let res = document.getElementById('result');
            
            if(!input.trim()) { alert("कोड तो डालो भाई!"); return; }

            let output = "";
            if(action === 'clean') {
                output = input.split('\n').map(l => l.trim()).filter(l => l !== "").join('\n');
            } else if(action === 'minify') {
                output = input.replace(/\s+/g, ' ').trim();
            } else if(action === 'convert') {
                output = `// ${src} से ${target} में बदलना बाकी है... \n// लॉजिक: ${input}`;
            }

            res.textContent = output;
            document.getElementById('copyBtn').style.display = "block";
            Prism.highlightElement(res);
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('result').textContent);
            alert("कोड कॉपी हो गया!");
        }
    </script>
</body>
</html>
