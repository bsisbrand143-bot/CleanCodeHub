    </style><!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>CleanCodeHub</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 200px; margin-bottom: 10px; }
        /* डार्क मोड स्टाइल */
        body.dark-mode { background-color: #121212; color: #ffffff; }
        body.dark-mode textarea { background-color: #1e1e1e; color: #ffffff; border: 1px solid #333; }
        body.dark-mode h1 { color: #bb86fc; }
    </style>
</head>
<body>
    <h1>Welcome to CleanCodeHub</h1>
    <button onclick="toggleDarkMode()">डार्क मोड बदलें</button>
    <p>अपना कोड यहाँ पेस्ट करें और क्लीन करें:</p>
    <textarea id="codeInput" placeholder="अपना कोड यहाँ लिखें..."></textarea><br>
    <button onclick="cleanCode()">क्लीन करें</button>
    <p id="result"></p>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
        function cleanCode() {
            let input = document.getElementById('codeInput').value;
            document.getElementById('result').innerText = "कोड प्रोसेस हो गया: " + input.trim();
        }
    </script>
</body>
</html>
