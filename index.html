
<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Code Hub Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        h1 { text-align: center; margin-bottom: 20px; font-size: 24px; }
        textarea { width: 100%; height: 300px; background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 15px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 14px; resize: vertical; box-sizing: border-box; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; justify-content: center; align-items: center; }
        select, button { padding: 12px 18px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        select { background: #333; color: white; font-size: 14px; }
        button { background: #4a90e2; color: white; transition: 0.3s; font-size: 14px; }
        button:hover { background: #357abd; }
        .result-box { position: relative; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #444; margin-top: 20px; min-height: 100px; }
        .spinner { border: 4px solid #333; border-top: 4px solid #4a90e2; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .action-btns { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .mini-btn { background: #44400; padding: 5px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; color: #fff; }
        .mini-btn:hover { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>Clean Code Hub Pro</h1>
    <textarea id="codeInput" placeholder=""></textarea>
    
    <div class="toolbar">
        <span style="font-weight: bold; font-size: 15px;">इस भाषा में बदलें:</span>
        <select id="targetLang">
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
            <option value="Java">Java</option>
            <option value="C++">C++</option>
            <option value="HTML">HTML</option>
        </select>
        <button onclick="convertCode()">🚀 सर्च / कन्वर्ट</button>
    </div>

    <div class="result-box">
        <div class="action-btns">
            <span class="mini-btn" onclick="copyResult()">Copy</span>
            <span class="mini-btn" onclick="clearAll()">Clear</span>
        </div>
        <pre><code id="result" class="language..</code></pre>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script>
    async function convertCode() {
        let res = document.getElementById('result');
        let codeValue = document.getElementById('codeInput').value.trim();
        
        if(!codeValue) {
            alert(");
            return;
        }

     
        res.innerHTML = '<div class="spinner"></div><p style="text-align:cente
        
        try {
            const response = await fetch('/api/convert', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    code: codeValue, 
                    targetLang: document.getElementById('targetLang').value 
                })
            });
            
            const data = await response.json();
            
            if(data.error) {
                res.textContent = "Error: " + data.error;

                Prism.highlightAll(); // र
            }
        } catch (e) {

        }
    }

</script>
</body>
</html>
