<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>CleanCodeHub</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        textarea { width: 90%; height: 200px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Welcome to CleanCodeHub</h1>
    <p>अपना कोड यहाँ पेस्ट करें और क्लीन करें:</p>
    <textarea id="codeInput" placeholder="अपना कोड यहाँ लिखें..."></textarea><br>
    <button onclick="cleanCode()">क्लीन करें</button>
    <p id="result"></p>

    <script>
        function cleanCode() {
            let input = document.getElementById('codeInput').value;
            // यहाँ आप अपना असली लॉजिक लगा सकते हैं
            document.getElementById('result').innerText = "कोड प्रोसेस हो गया: " + input.trim();
        }
    </script>
</body>
</html>
